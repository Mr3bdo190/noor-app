name: Flutter CI Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
    - name: Prepare Android Project
      run: |
        flutter create --org com.bodadroid noor_app
        
        # 🚀 ترقية إصدار الكوتلن لـ 1.9.22 عشان كل المكتبات الحديثة تشتغل
        sed -i "s/ext.kotlin_version = '.*'/ext.kotlin_version = '1.9.22'/g" noor_app/android/build.gradle
        sed -i "s/1.7.1/1.9.22/g" noor_app/android/settings.gradle
        
        # رفع إصدار الأندرويد الأدنى لـ 21
        sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' noor_app/android/app/build.gradle
        sed -i 's/minSdkVersion 19/minSdkVersion 21/g' noor_app/android/app/build.gradle
        sed -i 's/minSdkVersion 16/minSdkVersion 21/g' noor_app/android/app/build.gradle
        
        # إضافة التصاريح
        sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.VIBRATE" />' noor_app/android/app/src/main/AndroidManifest.xml
        
        cp -r lib noor_app/
        cp pubspec.yaml noor_app/
    - name: Build APK
      run: |
        cd noor_app
        flutter pub get
        flutter build apk --release
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Noor-Master-App
        path: noor_app/build/app/outputs/flutter-apk/app-release.apk
